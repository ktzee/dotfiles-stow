## Picture-in-picture overlays
windowrule {
    name = fix-pip
    match:class = pip
    float = on
    pin = on
    size = 600 338
    keep_aspect_ratio = on
    border_size = 0
    opacity = 1 1
    move = 100%-w-40 4%
}

windowrule {
    name = floats
    match:tag = floating-window
    float = on
    center = on
    size = 800 600
}

windowrule = match:class (blueberry.py|Impala|Wiremix|org.gnome.NautilusPreviewer|com.gabm.satty|Omarchy|About|TUI.float), tag +floating-window
windowrule = match:class (xdg-desktop-portal-gtk|sublime_text|DesktopEditors|org.gnome.Nautilus), match:title ^(Open.*Files?|Open Folder|Save.*Files?|Save.*As|Save|All Files), tag +floating-window

# Enable FIFO for games - hyprctl clients
windowrule {
    name = fifo-for-games
    match:title = (VRising|Deadlock|Path of Exile|Path of Exile 2|^(steam_app_.*)|^(bms_linux))
    immediate = on
}

# PoE Stuff
windowrule {
    name=poe
    match:title = (Path of Exile|Path of Exile 2|steam_app_238960)
    tag = +poe
    fullscreen = on
}
windowrule {
    name=apt
    match:title = (Awakened PoE Trade|Exiled Exchange 2)
    float = on
    no_blur = on
    no_focus = on
    no_shadow = on
    border_size = 0
    pin = on
    render_unfocused = on
    size = 100% 100%
    center = on
}
