# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# windowrule = float,class:^(kitty)$,title:^(kitty)$
windowrule = match:class brave-browser, workspace name:q
windowrule = match:class floorp, workspace name:q
windowrule = match:class steam, workspace name:s
windowrule = match:class net.lutris.Lutris, workspace name:s
windowrule = match:class org.telegram.desktop, workspace name:3
windowrule = match:class signal, workspace name:3
windowrule = match:class vesktop, workspace name:3
windowrule = match:class discord, workspace name:3

